<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game recommender</title>
    
</head>
<body>
        <style>

        * {

            margin: 0;

            padding: 0;

            box-sizing: border-box;
        }

       body {

            font-family: Arial, sans-serif;

            background: linear-gradient(150deg, #171A21 0%, #020d29e1 100%);

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

        }

        .container {

            text-align: center;

            background: rgba(0, 0, 0, 0.3);

            padding: 50px;

            border-radius: 10px;

            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);

        }

       

        h1 {

            color: #fff;

            margin-bottom: 10px;

            font-size: 2.5em;

        }

       

        p {

            color: #ddd;

            margin-bottom: 40px;

            font-size: 1.1em;

        }

       

        .button-group {

            display: flex;

            gap: 20px;

            justify-content: center;

            flex-wrap: wrap;

        }

       

        button {

            padding: 15px 40px;

            font-size: 1.1em;

            border: none;

            border-radius: 5px;

            cursor: pointer;

            transition: all 0.3s ease;

            font-weight: bold;

        }

       

        .btn1-general {

            background-color: #00a8cc;

            color: #000;

        }

        .btn2-general {

            background-color: #fa0000;

            color: #000;

        }


       

        .btn1-general:hover {

            background-color: #006075;

            transform: scale(1.07);

        }

       

        .btn2-general:hover {

            background-color: #7a0000;

            transform: scale(1.07);

        }


       </style>
    <Div class="container">
        <h1>Steam Game Recommendations</h1>

        <p>Find your next favorite game</p>

        <div class="button-group">

            <button class="btn1-general" onclick="goToGeneral()">General Recommendations</button>

            <button class="btn2-general" onclick="goToSpecific()">Specific Recommendations</button>

        </div>        

    </Div>

</body>
</html>
