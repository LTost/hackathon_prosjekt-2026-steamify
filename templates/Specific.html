<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Specific Recommendations</title>
    <script>
        function getCookie(name) {
            const nameEQ = name + "=";
            const cookies = document.cookie.split(';');
            for(let i = 0; i < cookies.length; i++) {
                let cookie = cookies[i].trim();
                if(cookie.indexOf(nameEQ) === 0) {
                    return decodeURIComponent(cookie.substring(nameEQ.length));
                }
            }
            return null;
        }
        if(!getCookie("steamUsername")) {
            window.location.href = "Username-input";
        }
    </script>
</head>
<body>
    <py-script src="./Hackaton.py" config="./pyscript.json"></py-script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(150deg, #171A21 0%, #020d29e1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            border: 2px solid #d80000;
            font-size: 16px;
            color: #fff;
        }

        .containerLoad {
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            border: 2px solid #d80000;
            font-size: 16px;
            color: #fff;
            display: none;
        }

        .container input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .container input:focus {
            outline: none;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 8px 32px rgba(216, 0, 0, 0.5);
        }

        input {
            width: 100%;
            padding: 12px 15px;
            font-size: 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            color: #fff;
            outline: none;
            transition: 0.3s ease;
        }

        input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        input:focus {
            border-color: #b20000;
            box-shadow: 0 0 10px #d80000;
        }

        .btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            color: #000;
            background: #d80000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px #b20000;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .mainbtn {
            display: inline-block;
            padding: 12px 24px;
            margin: 10px;
            font-size: 16px;
            color: #fff;
            background-color: #d80000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .mainbtn:hover {
            background-color: #b20000;
            box-shadow: 0 4px 12px #d80000;
            transform: scale(1.07);
        }

        h1 {
            color: aliceblue;
            font-size: 2rem;
            margin-bottom: 20px;
        }
    
        .navbar{
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background:#171a21;
            height:60px;
            display:flex;
            align-items:center;
            padding:0 40px;
            box-shadow:0 3px 10px rgba(0,0,0,0.6);
            z-index:1000;
        }

        .logo{
            color:#66c0f4;
            font-size:22px;
            font-weight:bold;
            letter-spacing:1px;
        }

        .nav-links{
            margin-left:40px;
            display:flex;
            gap:25px;
        }

        .nav-links a{
            color:#b8b6b4;
            text-decoration:none;
            font-size:14px;
        }

        .nav-links a:hover{
            color:white;
        }

    </style>

<div class="navbar">
    <div class="logo">Steamify</div>
    <div class="nav-links">
    <a href="/Main">Main</a>
    <a href="https://store.steampowered.com" target="_blank">Open Steam</a>
    <a href="/Description">About</a>
    </div>
</div>
    
    <script>
    function entersubmit(Enter) {
        if(event.keyCode == 13) {
            document.forms.submitfrom.submit();
            document.forms.submitfrom.fname.value = ""; 
        }
    }
    function showLoading() {
        document.getElementById('results').style.display = 'none'; 
        document.getElementById('loadingoverlay').style.display = 'flex';
        document.getElementById('loadingoverlay').innerText = "Loading...";
    }
    </script>

    <div id="loadingoverlay" class="containerLoad" style="color: aliceblue; justify-content: center;"></div>

    <div class="container" id="results">
        <h1>Specific Recommendations</h1>
        <p style="color: aliceblue; font-size: 1.2rem;">Enter your specific query:</p>
        <div onclick="">
            <form action="Specific-Game-Recommendations" method="POST" id="submitfrom" onsubmit="showLoading()">
                <input type="text" name="query" placeholder="Your query here" required onkeydown="entersubmit(Enter)" style="width: 93.6%;">
                <input class="btn" type="submit" ></button>
            </form>
        </div>
        <div style="margin-top: 20px;">
            <a href="/Main" class="mainbtn">Back to Main</a>
        </div>
    </div>

</body>
</html>
